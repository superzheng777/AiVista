spring:
  application:
    name: aivista
  datasource:
    url: ${AIVISTA_DB_URL:jdbc:mysql://localhost:3306/aivista?serverTimezone=UTC&connectionTimeZone=UTC&forceConnectionTimeZoneToSession=true&characterEncoding=UTF-8}
    username: ${AIVISTA_DB_USERNAME:root}
    password: ${AIVISTA_DB_PASSWORD:1234}
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-migration-naming: true

mybatis-flex:
  configuration:
    map-underscore-to-camel-case: true

server:
  port: 8888
  servlet:
    context-path: /api

app:
  cors:
    # 多个来源以英文逗号分隔；生产环境请配置为实际前端域名。
    allowed-origins: ${AIVISTA_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}
  auth:
    access-token-ttl: 15m
    refresh-token-ttl: 14d
    refresh-token-bytes: 32
    jwt:
      # 仅用于本地开发；生产环境必须通过 AIVISTA_JWT_SECRET 覆盖。
      secret: ${AIVISTA_JWT_SECRET:aivista-local-development-jwt-secret-change-before-production}
    cookie:
      name: refresh_token
      path: /api/auth
      secure: ${AIVISTA_COOKIE_SECURE:false}
      same-site: Lax
    argon2:
      salt-length: 16
      hash-length: 32
      parallelism: 1
      memory: 16384
      iterations: 2
    session-cleanup:
      enabled: true
      retention: 7d
      batch-size: 500
      max-batches: 10
      fixed-delay-ms: 3600000

# springdoc-openapi：生成 OpenAPI 3 接口描述。
springdoc:
  # OpenAPI JSON 描述文件的访问路径：/api/v3/api-docs。
  api-docs:
    path: /v3/api-docs
  # Swagger UI 的访问路径：/api/swagger-ui.html（Knife4j 页面为 /api/doc.html）。
  swagger-ui:
    path: /swagger-ui.html
  # 接口分组。后续可按用户端、管理端等业务拆分为多个分组。
  group-configs:
    - group: default # 文档分组名称，会显示在 Knife4j 的分组列表中。
      packages-to-scan: com.superz.aivista # 扫描各业务模块的 api 包中的 Controller。

# Knife4j：OpenAPI 文档的增强 UI 配置。
knife4j:
  enable: true # 启用 Knife4j 增强功能与 /doc.html 页面。
  setting:
    language: zh_cn # Knife4j UI 使用简体中文。
